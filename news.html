<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COSPICK 뷰티 뉴스 — 화장품 트렌드 한눈에</title>
  <meta name="description" content="화장품·뷰티 업계 최신 뉴스를 크롤링해 한 화면에 큐레이션합니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .news-hero { text-align: center; padding: 56px 20px 24px; }
    .news-hero .hero-eyebrow { color: var(--point-deep); font-size: .8rem; letter-spacing: .15em; font-weight: 700; }
    .news-hero h1 { font-size: 2rem; margin: 8px 0 6px; }
    .news-hero p { color: var(--muted); }
    .news-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 8px 20px 28px; }
    .news-tab { padding: 8px 18px; border-radius: 999px; border: 1px solid var(--line); background: var(--card); color: var(--muted); font-size: .9rem; font-weight: 500; }
    .news-tab.active { background: var(--point); color: #fff; border-color: var(--point); }
    .news-grid { max-width: 1080px; margin: 0 auto; padding: 0 20px 80px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .news-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.05); transition: transform .15s, box-shadow .15s; display: flex; flex-direction: column; gap: 10px; }
    .news-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(169,105,91,.10); }
    .news-card .nc-src { font-size: .75rem; color: var(--point-deep); font-weight: 600; }
    .news-card .nc-title { font-size: 1.02rem; font-weight: 700; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .news-card .nc-sum { font-size: .88rem; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .news-msg { text-align: center; color: var(--muted); padding: 40px; grid-column: 1/-1; }
  </style>
</head>
<body>
  <div class="topbar">💄 화장품 트렌드, COSPICK 뷰티 뉴스에서 매일 업데이트</div>

  <header class="header">
    <nav class="nav">
      <a href="index.html" class="logo">COSPICK</a>
      <ul class="nav-menu">
        <li><a href="index.html#products">쇼핑몰</a></li>
        <li><a href="news.html">뷰티뉴스</a></li>
        <li><a href="index.html#about">브랜드</a></li>
      </ul>
      <div class="nav-icons">
        <a href="index.html" aria-label="홈">🏠</a>
      </div>
    </nav>
  </header>

  <section class="news-hero">
    <p class="hero-eyebrow">BEAUTY NEWS</p>
    <h1>오늘의 뷰티 뉴스</h1>
    <p>화장품·뷰티 업계 최신 소식을 크롤링해 한곳에 모았어요.</p>
  </section>

  <div class="news-tabs" id="tabs">
    <button class="news-tab active" data-cat="전체">전체</button>
    <button class="news-tab" data-cat="신제품">신제품</button>
    <button class="news-tab" data-cat="트렌드">트렌드</button>
    <button class="news-tab" data-cat="성분">성분</button>
    <button class="news-tab" data-cat="브랜드">브랜드</button>
  </div>

  <div class="news-grid" id="newsGrid">
    <p class="news-msg">뉴스를 불러오는 중…</p>
  </div>

  <footer class="footer">
    <div class="footer-top">
      <div class="logo">COSPICK</div>
      <p>당신의 피부를 고르다</p>
    </div>
    <div class="footer-info">
      <p>뉴스 출처는 각 언론사이며, 제목·요약은 자동 수집되어 원문 링크로 연결됩니다.</p>
      <p>© 2026 COSPICK. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const grid = document.getElementById("newsGrid");
    const tabs = document.getElementById("tabs");
    let current = "전체";

    async function loadNews(cat) {
      grid.innerHTML = `<p class="news-msg">뉴스를 불러오는 중…</p>`;
      try {
        const r = await fetch("/api/news?cat=" + encodeURIComponent(cat));
        const d = await r.json();
        const items = d.items || [];
        if (!items.length) { grid.innerHTML = `<p class="news-msg">표시할 뉴스가 없습니다.</p>`; return; }
        grid.innerHTML = items.map((n) => `
          <a class="news-card" href="${n.link}" target="_blank" rel="noopener">
            <span class="nc-src">${n.source || "뉴스"}</span>
            <span class="nc-title">${n.title}</span>
            ${n.summary ? `<span class="nc-sum">${n.summary}</span>` : ""}
          </a>`).join("");
      } catch {
        grid.innerHTML = `<p class="news-msg">뉴스를 불러오지 못했습니다.</p>`;
      }
    }

    tabs.addEventListener("click", (e) => {
      const btn = e.target.closest(".news-tab");
      if (!btn) return;
      current = btn.dataset.cat;
      [...tabs.children].forEach((b) => b.classList.toggle("active", b === btn));
      loadNews(current);
    });

    loadNews(current);
  </script>
</body>
</html>
